<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퀀트 트레이딩 터미널</title>
    <style>
        /* 우주 터미널 배경 (실제 우주 이미지에 어두운 필터를 씌움) */
        body {
            margin: 0;
            padding: 0;
            background: #050814 url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2560&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #d1d5db;
            font-family: 'Malgun Gothic', '돋움', sans-serif;
            font-size: 12px;
        }

        /* 배경을 어둡게 눌러주는 반투명 오버레이 */
        .overlay {
            background-color: rgba(10, 15, 20, 0.88);
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 상단 상태바 디자인 */
        .status-bar {
            color: #8ce196;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        /* 입력 및 컨트롤 패널 */
        #inputArea {
            width: 100%;
            height: 80px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            margin-bottom: 10px;
            font-family: inherit;
        }
        button {
            background-color: #2ea043; color: white; border: none; padding: 8px 16px; 
            cursor: pointer; font-weight: bold; margin-bottom: 20px;
        }
        button:hover { background-color: #3fb950; }

        /* 테이블 기본 디자인 */
        table {
            border-collapse: collapse;
            width: 100%;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        th, td {
            border: 1px solid #2d333b;
            padding: 5px 8px;
            white-space: nowrap;
        }

        /* 텍스트 정렬 */
        .text-center { text-align: center; }
        .text-right { text-align: right; }

        /* S15DCA (붉은색 테마) */
        .title-red {
            background-color: rgba(100, 30, 30, 0.85);
            color: #ffb3b3;
            font-weight: bold;
            text-align: center;
        }

        /* L15DCA (청록색 테마) */
        .title-teal {
            background-color: rgba(30, 90, 80, 0.85);
            color: #b3ffff;
            font-weight: bold;
            text-align: center;
        }

        /* 항목 헤더 (검은색 배경) */
        .header-row th {
            background-color: rgba(5, 5, 5, 0.9);
            color: #e6edf3;
            text-align: center;
            font-weight: normal;
        }

        /* 일반 데이터 행 (투명도 조절) */
        .data-row { background-color: rgba(15, 20, 25, 0.4); }
        .data-row:hover { background-color: rgba(255, 255, 255, 0.05); }

        /* 합계 행 */
        .total-row {
            background-color: rgba(20, 45, 30, 0.85);
            color: #8ce196;
            font-weight: bold;
        }
        .total-row td { text-align: right; }
        .total-row td:first-child { text-align: center; color: #ffea7f; } /* '합계' 글자 노란색 */

    </style>
</head>
<body>

<div class="overlay">
    <div id="controlPanel">
        <textarea id="inputArea" placeholder="엑셀 데이터를 복사(Ctrl+C)하여 여기에 붙여넣기(Ctrl+V) 하세요."></textarea><br>
        <button onclick="renderTable()">터미널 뷰어로 변환</button>
    </div>

    <div class="status-bar">L방어폭: 28.51% &nbsp;&nbsp; L망아폭: 28.51% &nbsp;&nbsp; 예상순총금: 1197.00</div>
    
    <div id="output"></div>
</div>

<script>
function renderTable() {
    const text = document.getElementById('inputArea').value;
    if (!text.trim()) return alert("데이터를 입력해주세요.");

    const lines = text.split('\n');
    let html = '<table>';

    lines.forEach(line => {
        if (!line.trim()) return;
        const cells = line.split('\t');
        
        let trClass = '';
        let isTitle = false;
        let isHeader = false;
        let isTotal = false;

        // 행 성격 분류
        if (line.includes('BINANCE_S')) { trClass = 'title-red'; isTitle = true; }
        else if (line.includes('BINANCE_L')) { trClass = 'title-teal'; isTitle = true; }
        else if (line.includes('전체 그룹 수')) { trClass = 'header-row'; isHeader = true; }
        else if (line.includes('합계')) { trClass = 'total-row'; isTotal = true; }
        else { trClass = 'data-row'; }

        html += `<tr class="${trClass}">`;

        cells.forEach((cell, index) => {
            let content = cell.trim();
            
            // 데이터 행일 경우, 세 번째 열(종료일) 앞에 우주선/행성 이모지 추가 (이미지 고증)
            if (!isTitle && !isHeader && !isTotal && index === 2 && content !== '') {
                content = `🪐 ${content}`;
            }

            if (isTitle) {
                // 타이틀은 전체 병합
                if (index === 0) html += `<td colspan="20">${content}</td>`;
            } else if (isHeader) {
                html += `<th>${content}</th>`;
            } else {
                // 1, 2, 3번째 열은 가운데 정렬, 나머지는 우측 정렬
                let alignClass = (index < 3 || isTotal && index === 0) ? 'text-center' : 'text-right';
                html += `<td class="${alignClass}">${content}</td>`;
            }
        });
        html += `</tr>`;
    });

    html += '</table>';
    
    // 테이블 출력 후 입력창 숨기기
    document.getElementById('output').innerHTML = html;
    document.getElementById('controlPanel').style.display = 'none';
}
</script>

</body>
</html>

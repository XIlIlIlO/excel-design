<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이버펑크 트레이딩 터미널</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        /* CRT 모니터 스캔라인 및 사이버펑크 기본 배경 */
        body {
            margin: 0;
            padding: 20px;
            background-color: #02040a;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #a5d6ff;
            font-family: 'Share Tech Mono', 'Malgun Gothic', monospace;
            font-size: 13px;
            text-shadow: 0 0 2px rgba(165, 214, 255, 0.4);
        }

        /* 컨트롤 패널 UI */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        #inputArea {
            width: 100%;
            height: 80px;
            background: rgba(13, 17, 23, 0.9);
            color: #0ff;
            border: 1px solid #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            padding: 10px;
            font-family: 'Share Tech Mono', monospace;
            outline: none;
            box-sizing: border-box;
        }
        
        #inputArea:focus {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        /* 네온 버튼 디자인 */
        button {
            background: transparent;
            color: #0ff;
            border: 1px solid #0ff;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2) inset, 0 0 10px rgba(0, 255, 255, 0.2);
        }

        button:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8) inset, 0 0 20px rgba(0, 255, 255, 0.8);
        }

        #downloadBtn {
            display: none; /* 초기에는 숨김 */
            color: #39ff14;
            border-color: #39ff14;
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2) inset, 0 0 10px rgba(57, 255, 20, 0.2);
        }

        #downloadBtn:hover {
            background: #39ff14;
            color: #000;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.8) inset, 0 0 20px rgba(57, 255, 20, 0.8);
        }

        /* 데이터 테이블 디자인 */
        .table-container {
            overflow-x: auto;
            border: 1px solid #1f6feb;
            box-shadow: 0 0 20px rgba(31, 111, 235, 0.3);
            background: rgba(1, 4, 9, 0.8);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            white-space: nowrap;
        }

        th, td {
            border: 1px solid rgba(31, 111, 235, 0.3);
            padding: 6px 10px;
        }

        .text-center { text-align: center; }
        .text-right { text-align: right; }

        /* S15DCA (붉은색 네온) */
        .title-red {
            background: linear-gradient(90deg, rgba(255, 0, 0, 0.2) 0%, rgba(100, 0, 0, 0.8) 50%, rgba(255, 0, 0, 0.2) 100%);
            color: #ff4d4d;
            font-weight: bold;
            text-shadow: 0 0 8px #ff4d4d;
            text-align: center;
        }

        /* L15DCA (청록색 네온) */
        .title-teal {
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.1) 0%, rgba(0, 150, 150, 0.8) 50%, rgba(0, 255, 255, 0.1) 100%);
            color: #00ffff;
            font-weight: bold;
            text-shadow: 0 0 8px #00ffff;
            text-align: center;
        }

        /* 항목 헤더 */
        .header-row th {
            background-color: rgba(31, 111, 235, 0.2);
            color: #79c0ff;
            text-transform: uppercase;
        }

        /* 데이터 행 호버 효과 (홀로그램 스캔 느낌) */
        .data-row { transition: background 0.2s; }
        .data-row:hover { 
            background-color: rgba(56, 139, 253, 0.15); 
            box-shadow: inset 0 0 10px rgba(56, 139, 253, 0.5);
        }

        /* 합계 행 */
        .total-row {
            background-color: rgba(46, 160, 67, 0.15);
            color: #3fb950;
            font-weight: bold;
            text-shadow: 0 0 5px #3fb950;
        }
        .total-row td { text-align: right; }
        .total-row td:first-child { text-align: center; color: #d2a8ff; text-shadow: 0 0 5px #d2a8ff;}
    </style>
</head>
<body>

    <div class="control-panel" id="controls">
        <textarea id="inputArea" placeholder="[ SYSTEM READY ] : 엑셀 데이터를 여기에 붙여넣으십시오 (Ctrl+V)"></textarea>
        <div class="btn-group">
            <button onclick="renderTable()">▶ INITIALIZE TERMINAL</button>
            <button id="downloadBtn" onclick="downloadExcel()">💾 EXPORT TO EXCEL</button>
        </div>
    </div>
    
    <div class="table-container" id="output">
        </div>

<script>
function renderTable() {
    const text = document.getElementById('inputArea').value;
    if (!text.trim()) {
        alert("데이터를 입력해주세요.");
        return;
    }

    const lines = text.split('\n');
    // id="dataTable"을 부여하여 엑셀 다운로드 시 인식하게 함
    let html = '<table id="dataTable">';

    lines.forEach(line => {
        if (!line.trim()) return;
        const cells = line.split('\t');
        
        let trClass = '';
        let isTitle = false;
        let isHeader = false;
        let isTotal = false;

        // 문자열에 포함된 키워드로 행(Row) 속성 식별
        if (line.includes('BINANCE_S')) { trClass = 'title-red'; isTitle = true; }
        else if (line.includes('BINANCE_L')) { trClass = 'title-teal'; isTitle = true; }
        else if (line.includes('전체 그룹 수')) { trClass = 'header-row'; isHeader = true; }
        else if (line.includes('합계')) { trClass = 'total-row'; isTotal = true; }
        else { trClass = 'data-row'; }

        html += `<tr class="${trClass}">`;

        cells.forEach((cell, index) => {
            let content = cell.trim();
            
            // 데이터 행의 종료일 열에 우주선 이모지 삽입 (이미지 고증)
            if (!isTitle && !isHeader && !isTotal && index === 2 && content !== '') {
                content = `🪐 ${content}`;
            }

            if (isTitle) {
                if (index === 0) html += `<td colspan="20">${content}</td>`;
            } else if (isHeader) {
                html += `<th>${content}</th>`;
            } else {
                let alignClass = (index < 3 || (isTotal && index === 0)) ? 'text-center' : 'text-right';
                html += `<td class="${alignClass}">${content}</td>`;
            }
        });
        html += `</tr>`;
    });

    html += '</table>';
    
    // 화면에 테이블 렌더링
    document.getElementById('output').innerHTML = html;
    
    // 입력창은 숨기고 엑셀 다운로드 버튼 표시
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('downloadBtn').style.display = 'inline-block';
}

// 엑셀 다운로드 기능 (SheetJS 라이브러리 사용)
function downloadExcel() {
    // 1. 화면에 렌더링된 테이블 요소를 가져옴
    const table = document.getElementById('dataTable');
    if (!table) return;

    // 2. 워크북 생성 및 테이블 데이터 파싱
    const wb = XLSX.utils.table_to_book(table, {sheet: "QuantData"});
    
    // 3. 파일명 생성 (현재 시간 기반)
    const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, "");
    const fileName = `Terminal_Export_${dateStr}.xlsx`;

    // 4. 엑셀 파일 다운로드 실행
    XLSX.writeFile(wb, fileName);
}
</script>

</body>
</html>
